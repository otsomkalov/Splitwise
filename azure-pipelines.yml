trigger:
  - main

pr:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  Configuration: 'Release'

steps:
  - task: DotNetCoreCLI@2
    displayName: "Build project"
    inputs:
      command: 'build'
      arguments: '-c $(Configuration)'
  - task: DotNetCoreCLI@2
    displayName: "Run tests"
    inputs:
      command: 'test'
      projects: 'tests/Splitwise.Tests.Unit/Splitwise.Tests.Unit.csproj'
      arguments: '-c $(Configuration) --collect:"XPlat Code Coverage"'
  - task: DotNetCoreCLI@2
    displayName: "Pack project into NuGet package"
    inputs:
      command: 'pack'
      packagesToPack: '**/Splitwise.csproj'
      versioningScheme: 'off'
      arguments: '-c $(Configuration) -o $(Build.ArtifactStagingDirectory)'
  - task: PublishPipelineArtifact@1
    displayName: "Publish artifacts"
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'lib'